appId: com.fastgif.app
---
# Flow: Editor Controls Visibility
# Verifies the editor toolbar buttons and controls bar toggle work.
# Since we can't import a real video in test, we verify the import
# screen buttons and toolbar structure are accessible.

- launchApp
- waitForAnimationToEnd

# Verify the Create tab is the default
- assertVisible: "Create something"

# Verify all import options have accessibility
- assertVisible: "From Video"
- assertVisible: "From Photos"
- assertVisible: "Open File"

# Navigate to Batch tab to verify controls exist there
- tapOn: "Batch"
- waitForAnimationToEnd
- assertVisible: "Add Files"

# Return to Create tab
- tapOn: "Create"
- waitForAnimationToEnd
- assertVisible: "Create something"
